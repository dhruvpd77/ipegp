<div class="modal fade" id="generateCredsModal" tabindex="-1" aria-labelledby="generateCredsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="generateCredsModalLabel">
                    <i class="bi bi-key me-1"></i> Generate Student Credentials
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted small mb-3">Choose how passwords should be set for the selected students.</p>

                <div class="border rounded p-3 mb-3">
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="password_mode_modal" id="pwdModeDefault" value="default" checked>
                        <label class="form-check-label fw-semibold" for="pwdModeDefault">Default password (same for all)</label>
                    </div>
                    <p class="small text-muted mb-2 ms-4">Set one common password for every selected student (e.g. 123123).</p>
                    <div class="ms-4">
                        <label class="form-label small mb-1" for="defaultPasswordInput">Default password</label>
                        <input type="text" class="form-control form-control-sm" id="defaultPasswordInput" value="123123" autocomplete="off">
                    </div>
                </div>

                <div class="border rounded p-3">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="password_mode_modal" id="pwdModeRandom" value="random">
                        <label class="form-check-label fw-semibold" for="pwdModeRandom">Random password (unique per student)</label>
                    </div>
                    <p class="small text-muted mb-0 ms-4 mt-2">Generate a unique random 4-digit password for each student.</p>
                </div>
            </div>
            <div class="modal-footer flex-wrap gap-2">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-accent" id="confirmGenerateCredsBtn" data-download="0">Generate</button>
                <button type="button" class="btn btn-primary-custom" id="confirmGenerateCredsDownloadBtn" data-download="1">
                    <i class="bi bi-download"></i> Generate &amp; Download
                </button>
            </div>
        </div>
    </div>
</div>

<script>
(function () {
    var pendingForm = null;
    var pendingDownload = '0';
    var modalEl = document.getElementById('generateCredsModal');
    if (!modalEl) return;

    var defaultInput = document.getElementById('defaultPasswordInput');
    var defaultRadio = document.getElementById('pwdModeDefault');
    var randomRadio = document.getElementById('pwdModeRandom');

    function setDefaultInputState() {
        if (!defaultInput) return;
        defaultInput.disabled = !defaultRadio.checked;
    }

    if (defaultRadio) defaultRadio.addEventListener('change', setDefaultInputState);
    if (randomRadio) randomRadio.addEventListener('change', setDefaultInputState);
    setDefaultInputState();

    document.querySelectorAll('[data-generate-creds]').forEach(function (btn) {
        btn.addEventListener('click', function (e) {
            e.preventDefault();
            pendingForm = btn.closest('form');
            pendingDownload = btn.getAttribute('data-download') || '0';
            if (!pendingForm) return;
            if (window.bootstrap) {
                bootstrap.Modal.getOrCreateInstance(modalEl).show();
            }
        });
    });

    function ensureHidden(form, name) {
        var input = form.querySelector('input[name="' + name + '"]');
        if (!input) {
            input = document.createElement('input');
            input.type = 'hidden';
            input.name = name;
            form.appendChild(input);
        }
        return input;
    }

    function submitWithMode(download) {
        if (!pendingForm) return;
        var mode = document.querySelector('input[name="password_mode_modal"]:checked');
        var passwordMode = mode ? mode.value : 'random';
        if (passwordMode === 'default') {
            var pwd = (defaultInput && defaultInput.value || '').trim();
            if (!pwd) {
                alert('Please enter a default password.');
                if (defaultInput) defaultInput.focus();
                return;
            }
            ensureHidden(pendingForm, 'default_password').value = pwd;
        } else {
            var existing = pendingForm.querySelector('input[name="default_password"]');
            if (existing) existing.remove();
        }
        ensureHidden(pendingForm, 'password_mode').value = passwordMode;
        ensureHidden(pendingForm, 'download').value = download;
        pendingForm.submit();
    }

    var confirmBtn = document.getElementById('confirmGenerateCredsBtn');
    var confirmDownloadBtn = document.getElementById('confirmGenerateCredsDownloadBtn');
    if (confirmBtn) {
        confirmBtn.addEventListener('click', function () { submitWithMode('0'); });
    }
    if (confirmDownloadBtn) {
        confirmDownloadBtn.addEventListener('click', function () { submitWithMode('1'); });
    }
})();
</script>
