{% if user.is_superuser or user.role == 'SUPER_ADMIN' or user.role == 'SEMESTER_ADMIN' %}
<form method="post" action="{% url 'portal:semester_toggle_active' sem.pk %}" class="d-inline"
      onsubmit="return confirm('{% if sem.is_active %}Deactivate{% else %}Activate{% endif %} semester {{ sem.name }}?');">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ request.get_full_path }}">
    {% if sem.is_active %}
    <button type="submit" class="btn btn-sm btn-outline-warning">
        <i class="bi bi-pause-circle"></i> Deactivate
    </button>
    {% else %}
    <button type="submit" class="btn btn-sm btn-outline-success">
        <i class="bi bi-play-circle"></i> Activate
    </button>
    {% endif %}
</form>
{% endif %}
